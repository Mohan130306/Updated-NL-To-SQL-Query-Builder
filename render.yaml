services:
  - type: web
    name: nl2sql-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false # User will input their Supabase URL here in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false # User will input their Vercel URL here in the Render dashboard
